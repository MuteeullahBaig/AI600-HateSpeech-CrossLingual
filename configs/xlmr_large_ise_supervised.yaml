# XLM-RoBERTa-large — full supervised ISE-Hate fine-tuning
# Starts from the EN-trained checkpoint (cross-lingual transfer upper bound)
# ISE train: 15,231 samples, ~39.8% hate / ~60.2% non-hate

model_name: xlm-roberta-large
max_length: 128

per_device_train_batch_size: 8
per_device_eval_batch_size: 16
gradient_accumulation_steps: 4       # effective batch = 32
learning_rate: 1.0e-5
num_train_epochs: 1
warmup_ratio: 0.1
weight_decay: 0.01

fp16: true
gradient_checkpointing: true         # required to stay within 12GB VRAM

# ISE: ~40% hate / 60% non-hate — upweight hate class by 2.5x (consistent with few-shot)
class_weights: [1.0, 2.5]

eval_strategy: epoch
save_strategy: epoch
load_best_model_at_end: true
metric_for_best_model: f1_hate
greater_is_better: true
save_total_limit: 1
save_only_model: true
report_to: none

seed: 42
