# XLM-RoBERTa-large — full supervised Urdu fine-tuning
# Starts from the EN-trained checkpoint (transfer learning upper bound)
# Urdu train: 7,208 samples, ~53.5% hate (nearly balanced)

model_name: xlm-roberta-large
max_length: 128

per_device_train_batch_size: 8
per_device_eval_batch_size: 16
gradient_accumulation_steps: 4       # effective batch = 32
learning_rate: 1.0e-5                # same as EN training — full fine-tune
num_train_epochs: 5
warmup_ratio: 0.1
weight_decay: 0.01

fp16: true
gradient_checkpointing: true

# Urdu data is 53.5% hate — nearly balanced, no upweighting needed
class_weights: [1.0, 1.0]

evaluation_strategy: epoch
save_strategy: epoch
load_best_model_at_end: true
metric_for_best_model: f1_hate
greater_is_better: true
save_total_limit: 2
report_to: none

seed: 42
